    <input type = "text" placeholder = "Add your task" id = "userTask"></input>
    <div>
        <button type = "button" onclick = "addTask()">ADD</button>
        <p id = "tasks"></p>
    </div>
    <script>
        function addTask() {
            var input = document.getElementById("userTask").value;
            var target = document.getElementById("tasks");
            target.insertAdjacentHTML("beforeend", input + "<br>"); 
        }
    </script>
